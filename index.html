<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATAVA Prayer & Iqamah Master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #141414;
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.4);
            --text-color: #ffffff;
            --text-muted: #888888;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: linear-gradient(145deg, #111, #181818);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 0 30px var(--gold-glow);
            border: 2px solid var(--gold);
            position: relative;
        }

        /* Mosque Name Edit Area */
        .mosque-header {
            text-align: center;
            margin-bottom: 15px;
        }

        .editable-mosque {
            background: none;
            border: 1px solid transparent;
            color: var(--gold);
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            width: 100%;
            padding: 5px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .editable-mosque:hover, .editable-mosque:focus {
            border-color: rgba(212, 175, 55, 0.3);
            background: rgba(212, 175, 55, 0.05);
            outline: none;
        }

        .main-title {
            text-align: center;
            color: var(--gold);
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .hijri-box {
            text-align: center;
            font-size: 0.9rem;
            color: #f3e5ab;
            background: rgba(212, 175, 55, 0.15);
            padding: 5px 15px;
            border-radius: 20px;
            margin: 0 auto 20px;
            display: table;
        }

        /* Prayer Rows with Iqamah Settings */
        .prayer-list { display: flex; flex-direction: column; gap: 12px; }

        .prayer-row {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }

        .prayer-row.active {
            border-color: var(--gold);
            background: linear-gradient(90deg, rgba(212, 175, 55, 0.1), #1a1a1a);
        }

        .row-top { display: flex; justify-content: space-between; align-items: center; }

        .prayer-name { font-weight: 700; font-size: 1.05rem; }
        .prayer-time { color: var(--gold); font-weight: 800; font-size: 1.1rem; }

        .iqamah-settings {
            margin-top: 10px;
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 8px;
        }

        .iqamah-input {
            width: 45px;
            background: #000;
            border: 1px solid #333;
            color: var(--gold);
            border-radius: 5px;
            padding: 2px 5px;
            text-align: center;
        }

        /* Footer Style */
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            text-align: center;
        }

        .footer .company {
            color: var(--gold);
            font-weight: 800;
            font-size: 0.95rem;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .footer .services {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .footer .dev-name {
            color: #ffffff;
            font-weight: 600;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="mosque-header">
        <input type="text" id="mosqueInput" class="editable-mosque" value="ജുമാ മസ്ജിദ് (Edit)" onchange="saveSettings()">
    </div>
    
    <div class="main-title">PRAYER TIMES</div>
    <div id="hijri-date" class="hijri-box">Loading...</div>

    <div class="prayer-list" id="prayerTable">
        <!-- Rows generated by JS -->
    </div>

    <div class="footer">
        <div class="company">ATAVA DIGITAL SERVICES & TRADING</div>
        <div class="services">Data Entry, Typing Works, Poster & Badge Design</div>
        <div class="dev-name">Developed by: Abdul Salam Ahsani Vazhakkad</div>
    </div>
</div>

<script>
    const prayers = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"];
    const namesML = ["സുബഹി", "ളുഹർ", "അസർ", "മഗ്‌രിബ്", "ഇഷാ"];
    
    // Load Saved Settings
    function loadSettings() {
        const savedMosque = localStorage.getItem('mosqueName');
        if(savedMosque) document.getElementById('mosqueInput').value = savedMosque;
        
        prayers.forEach(p => {
            const savedIq = localStorage.getItem('iqamah_'+p);
            if(savedIq) document.getElementById('iq_'+p).value = savedIq;
        });
    }

    function saveSettings() {
        localStorage.setItem('mosqueName', document.getElementById('mosqueInput').value);
        prayers.forEach(p => {
            localStorage.setItem('iqamah_'+p, document.getElementById('iq_'+p).value);
        });
    }

    async function getTimes() {
        const res = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Ajman&country=UAE&method=4');
        const json = await res.json();
        const t = json.data.timings;
        document.getElementById('hijri-date').innerText = json.data.date.hijri.day + " " + json.data.date.hijri.month.ar;

        let html = '';
        prayers.forEach((p, i) => {
            const savedIq = localStorage.getItem('iqamah_'+p) || "15";
            html += `
                <div class="prayer-row" id="row-${p}">
                    <div class="row-top">
                        <span class="prayer-name">${namesML[i]} (${p})</span>
                        <span class="prayer-time">${t[p]}</span>
                    </div>
                    <div class="iqamah-settings">
                        <span>ഇഖാമത്ത്: ബാങ്കിന് ശേഷം </span>
                        <input type="number" id="iq_${p}" class="iqamah-input" value="${savedIq}" onchange="saveSettings()">
                        <span>മിനിറ്റ്</span>
                    </div>
                </div>`;
        });
        document.getElementById('prayerTable').innerHTML = html;
        loadSettings();
    }

    getTimes();
</script>
</body>
</html>
