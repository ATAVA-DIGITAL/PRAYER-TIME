<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATAVA Prayer Master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #121212;
            --section-bg: linear-gradient(180deg, rgba(229, 193, 88, 0.08), rgba(15, 15, 15, 0.6));
            --gold: #e5c158;
            --gold-glow: rgba(229, 193, 88, 0.25);
            --text-color: #ffffff;
            --text-muted: #777777;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', -apple-system, system-ui, sans-serif;
        }

        /* Compact Mobile Shell */
        .container {
            width: 100%;
            max-width: 380px; /* മൊബൈലിൽ ഒതുങ്ങി നിൽക്കാൻ സൈസ് കുറച്ചു */
            background: #0f0f0f;
            border-radius: 20px;
            box-shadow: 0 0 20px var(--gold-glow);
            border: 2px solid var(--gold);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Matching Premium Header & Footer Background */
        .header, .footer {
            background: var(--section-bg);
            border-bottom: 1px solid rgba(229, 193, 88, 0.25);
            padding: 12px;
            text-align: center;
        }

        .footer {
            border-bottom: none;
            border-top: 1px solid rgba(229, 193, 88, 0.25);
            padding: 10px;
        }

        .editable-mosque {
            background: none;
            border: none;
            color: var(--gold);
            font-size: 0.95rem;
            font-weight: 700;
            text-align: center;
            width: 100%;
            margin-bottom: 3px;
            letter-spacing: 0.5px;
        }

        .editable-mosque:focus { outline: none; }

        .main-title {
            color: #ffffff;
            font-size: 1.4rem;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        /* Super Grid Calendar Box */
        .calendar-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 10px;
            border-radius: 10px;
            border: 1px solid rgba(229, 193, 88, 0.15);
            font-size: 0.78rem;
            font-weight: 600;
        }

        .cal-left { text-align: left; color: #fff2cc; }
        .cal-right { text-align: right; color: var(--gold); }

        /* Compact Inner Content */
        .content-body {
            padding: 12px;
        }

        .audio-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.02);
            padding: 6px;
            border-radius: 8px;
            font-size: 0.8rem;
        }

        .audio-controls label {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .audio-controls input:checked + span {
            color: var(--gold);
            font-weight: bold;
        }

        /* Tight & Super Fit Prayer Rows */
        .prayer-list { display: flex; flex-direction: column; gap: 6px; }

        .prayer-row {
            background: var(--card-bg);
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.02);
            transition: 0.3s;
        }

        .prayer-row.active {
            border-color: var(--gold);
            background: linear-gradient(90deg, rgba(229, 193, 88, 0.06), #161616);
        }

        .row-top { display: flex; justify-content: space-between; align-items: center; }
        .prayer-name { font-weight: 700; font-size: 0.88rem; }
        .prayer-time { color: var(--gold); font-weight: 800; font-size: 0.95rem; }

        .iqamah-settings {
            margin-top: 4px;
            font-size: 0.72rem;
            color: #888;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.03);
            padding-top: 4px;
        }

        .iqamah-input {
            width: 35px;
            background: #000;
            border: 1px solid #222;
            color: var(--gold);
            border-radius: 3px;
            padding: 1px;
            text-align: center;
            font-weight: bold;
            font-size: 0.72rem;
        }

        .iqamah-countdown {
            color: #55ff55;
            font-weight: 600;
        }

        /* Matching Footer Details */
        .footer .company {
            color: var(--gold);
            font-weight: 800;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            margin-bottom: 1px;
        }

        .footer .services {
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .footer .dev-name {
            color: #ffffff;
            font-weight: 600;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Matching Background Header -->
    <div class="header">
        <input type="text" id="mosqueInput" class="editable-mosque" value="ജുമാ മസ്ജിദ് (Tap to Edit)" onchange="saveSettings()">
        <div class="main-title">PRAYER TIMES</div>
        
        <!-- Super Calendar Row -->
        <div class="calendar-grid">
            <div class="cal-left" id="gregorian-date">Loading...</div>
            <div class="cal-right" id="hijri-date">Loading...</div>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="content-body">
        <div class="audio-controls">
            <label><input type="radio" name="alarmType" value="adhan" checked onchange="saveSettings()"><span><i class="fa-solid fa-volume-high"></i> Adhan</span></label>
            <label><input type="radio" name="alarmType" value="beep" onchange="saveSettings()"><span><i class="fa-solid fa-bell"></i> Beep</span></label>
            <label><input type="radio" name="alarmType" value="mute" onchange="saveSettings()"><span><i class="fa-solid fa-volume-xmark"></i> Mute</span></label>
        </div>

        <div class="prayer-list" id="prayerTable">
            <!-- Rows loaded by JS -->
        </div>
    </div>

    <!-- Matching Background Footer -->
    <div class="footer">
        <div class="company">ATAVA DIGITAL SERVICES & TRADING</div>
        <div class="services">Data Entry, Typing Works, Poster & Badge Design</div>
        <div class="dev-name">Developed by: Abdul Salam Ahsani Vazhakkad</div>
    </div>
</div>

<script>
    const prayers = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"];
    const namesML = ["സുബഹി", "ളുഹർ", "അസർ", "മഗ്‌രിബ്", "ഇഷാ"];
    let prayerTimes = {};
    let alarmPlayed = {};

    function playBeep() {
        let context = new (window.AudioContext || window.webkitAudioContext)();
        let osc = context.createOscillator();
        osc.type = "sine";
        osc.frequency.setValueAtTime(880, context.currentTime);
        osc.connect(context.destination);
        osc.start();
        osc.stop(context.currentTime + 1.5);
    }

    function playAdhan() {
        let audio = new Audio("https://www.islamcan.com/audio/adhan/azan1.mp3");
        audio.play().catch(e => console.log("Playback blocked"));
    }

    function triggerAlarm() {
        const type = document.querySelector('input[name="alarmType"]:checked').value;
        if (type === "adhan") playAdhan();
        if (type === "beep") playBeep();
    }

    function loadSettings() {
        const savedMosque = localStorage.getItem('mosqueName');
        if(savedMosque) document.getElementById('mosqueInput').value = savedMosque;
        
        const savedAlarm = localStorage.getItem('alarmChoice');
        if(savedAlarm) {
            document.querySelector(`input[name="alarmType"][value="${savedAlarm}"]`).checked = true;
        }
    }

    function saveSettings() {
        localStorage.setItem('mosqueName', document.getElementById('mosqueInput').value);
        const choice = document.querySelector('input[name="alarmType"]:checked').value;
        localStorage.setItem('alarmChoice', choice);
        prayers.forEach(p => {
            if(document.getElementById('iq_'+p)) {
                localStorage.setItem('iqamah_'+p, document.getElementById('iq_'+p).value);
            }
        });
    }

    async function getTimes() {
        try {
            const res = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Ajman&country=UAE&method=4');
            const json = await res.json();
            const t = json.data.timings;
            
            // Set Super Calendar values
            const dateObj = json.data.date;
            document.getElementById('gregorian-date').innerText = `${dateObj.gregorian.day} ${dateObj.gregorian.month.en} (${dateObj.gregorian.weekday.en})`;
            document.getElementById('hijri-date').innerText = `${dateObj.hijri.day} ${dateObj.hijri.month.en} ${dateObj.hijri.year} AH`;

            let html = '';
            prayers.forEach((p, i) => {
                prayerTimes[p] = t[p];
                const savedIq = localStorage.getItem('iqamah_'+p) || "15";
                html += `
                    <div class="prayer-row" id="row-${p}">
                        <div class="row-top">
                            <span class="prayer-name">${namesML[i]} (${p})</span>
                            <span class="prayer-time">${formatAMPM(t[p])}</span>
                        </div>
                        <div class="iqamah-settings">
                            <div>
                                <span>ഇഖാമത്ത്: ബാങ്കിന് ശേഷം </span>
                                <input type="number" id="iq_${p}" class="iqamah-input" value="${savedIq}" onchange="saveSettings()">
                                <span>മിനിറ്റ്</span>
                            </div>
                            <div class="iqamah-countdown" id="cd_${p}"></div>
                        </div>
                    </div>`;
            });
            document.getElementById('prayerTable').innerHTML = html;
            loadSettings();
            
            setInterval(checkLiveUpdates, 1000);
        } catch(e) {
            document.getElementById('gregorian-date').innerText = "Network Error";
        }
    }

    function formatAMPM(time24) {
        let [hours, minutes] = time24.split(':');
        hours = parseInt(hours);
        let ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12;
        hours = hours ? hours : 12; 
        return hours + ':' + minutes + ' ' + ampm;
    }

    function checkLiveUpdates() {
        let now = new Date();
        let currentHM = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        let currentHMS = currentHM + ":" + now.getSeconds().toString().padStart(2, '0');

        prayers.forEach(p => {
            let row = document.getElementById('row-' + p);
            let cdBox = document.getElementById('cd_' + p);
            if(!row || !prayerTimes[p]) return;

            if (prayerTimes[p] + ":00" === currentHMS && !alarmPlayed[p + currentHM]) {
                alarmPlayed[p + currentHM] = true;
                triggerAlarm();
            }

            let azanTime = prayerTimes[p];
            let iqMinutes = parseInt(document.getElementById('iq_' + p).value) || 0;
            
            let azanDate = new Date();
            let [h, m] = azanTime.split(':');
            azanDate.setHours(h, m, 0);
            
            let iqamahDate = new Date(azanDate.getTime() + iqMinutes * 60000);

            if (now >= azanDate && now <= iqamahDate) {
                row.classList.add('active');
                let diff = iqamahDate - now;
                let min = Math.floor(diff / 60000);
                let sec = Math.floor((diff % 60000) / 1000);
                cdBox.innerText = `ഇഖാമത്ത്: ${min}:${sec.toString().padStart(2,'0')}`;
            } else {
                row.classList.remove('active');
                cdBox.innerText = '';
            }
        });
    }

    getTimes();
</script>
</body>
</html>
