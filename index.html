<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATAVA Prayer, Iqamah & Adhan Master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #080808;
            --card-bg: rgba(22, 22, 22, 0.8);
            --gold: #e5c158;
            --gold-glow: rgba(229, 193, 88, 0.35);
            --text-color: #ffffff;
            --text-muted: #777777;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: linear-gradient(145deg, #101010, #151515);
            border-radius: 24px;
            padding: 18px;
            box-shadow: 0 0 25px var(--gold-glow);
            border: 2px solid var(--gold);
        }

        /* Compact Header Area */
        .mosque-header { text-align: center; margin-bottom: 5px; }

        .editable-mosque {
            background: none;
            border: 1px solid transparent;
            color: var(--gold);
            font-size: 1.1rem;
            font-weight: 700;
            text-align: center;
            width: 100%;
            padding: 3px;
            border-radius: 6px;
            letter-spacing: 0.5px;
        }

        .editable-mosque:focus {
            border-color: rgba(229, 193, 88, 0.4);
            background: rgba(229, 193, 88, 0.05);
            outline: none;
        }

        .main-title {
            text-align: center;
            color: #ffffff;
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 3px;
            margin-bottom: 2px;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        .hijri-box {
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: #fff2cc;
            background: rgba(229, 193, 88, 0.12);
            padding: 4px 12px;
            border-radius: 20px;
            margin: 0 auto 12px;
            display: table;
            border: 1px solid rgba(229, 193, 88, 0.2);
        }

        /* Compact Audio Settings */
        .audio-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.02);
            padding: 8px;
            border-radius: 10px;
            font-size: 0.85rem;
        }

        .audio-controls label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .audio-controls input:checked + span {
            color: var(--gold);
            font-weight: bold;
        }

        /* Extra Compact Prayer Rows */
        .prayer-list { display: flex; flex-direction: column; gap: 8px; }

        .prayer-row {
            background: var(--card-bg);
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.03);
            transition: 0.3s;
        }

        .prayer-row.active {
            border-color: var(--gold);
            background: linear-gradient(90deg, rgba(229, 193, 88, 0.08), #1a1a1a);
            box-shadow: 0 0 15px rgba(229, 193, 88, 0.1);
        }

        .row-top { display: flex; justify-content: space-between; align-items: center; }
        .prayer-name { font-weight: 700; font-size: 0.95rem; letter-spacing: 0.3px; }
        .prayer-time { color: var(--gold); font-weight: 800; font-size: 1.05rem; }

        .iqamah-settings {
            margin-top: 6px;
            font-size: 0.78rem;
            color: #999;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.04);
            padding-top: 6px;
        }

        .iqamah-input {
            width: 40px;
            background: #000;
            border: 1px solid #333;
            color: var(--gold);
            border-radius: 4px;
            padding: 1px 3px;
            text-align: center;
            font-weight: bold;
        }

        .iqamah-countdown {
            color: #55ff55;
            font-weight: 600;
            font-size: 0.75rem;
        }

        /* Compact Footer */
        .footer {
            margin-top: 20px;
            padding-top: 12px;
            border-top: 1px solid rgba(229, 193, 88, 0.2);
            text-align: center;
        }

        .footer .company {
            color: var(--gold);
            font-weight: 800;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .footer .services {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .footer .dev-name {
            color: #ffffff;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 0.2px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="mosque-header">
        <input type="text" id="mosqueInput" class="editable-mosque" value="ജുമാ മസ്ജിദ് (Tap to Edit)" onchange="saveSettings()">
    </div>
    
    <div class="main-title">PRAYER TIMES</div>
    <div id="hijri-date" class="hijri-box">Loading...</div>

    <!-- Alarm Type Choice -->
    <div class="audio-controls">
        <label><input type="radio" name="alarmType" value="adhan" checked onchange="saveSettings()"><span><i class="fa-solid fa-volume-high"></i> Adhan</span></label>
        <label><input type="radio" name="alarmType" value="beep" onchange="saveSettings()"><span><i class="fa-solid fa-bell"></i> Beep</span></label>
        <label><input type="radio" name="alarmType" value="mute" onchange="saveSettings()"><span><i class="fa-solid fa-volume-xmark"></i> Mute</span></label>
    </div>

    <div class="prayer-list" id="prayerTable">
        <!-- Rows generated by JS -->
    </div>

    <div class="footer">
        <div class="company">ATAVA DIGITAL SERVICES & TRADING</div>
        <div class="services">Data Entry, Typing Works, Poster & Badge Design</div>
        <div class="dev-name">Developed by: Abdul Salam Ahsani Vazhakkad</div>
    </div>
</div>

<script>
    const prayers = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"];
    const namesML = ["സുബഹി", "ളുഹർ", "അസർ", "മഗ്‌രിബ്", "ഇഷാ"];
    let prayerTimes = {};
    let alarmPlayed = {};

    // Web Audio API for fallback Beep sound
    function playBeep() {
        let context = new (window.AudioContext || window.webkitAudioContext)();
        let osc = context.createOscillator();
        osc.type = "sine";
        osc.frequency.setValueAtTime(880, context.currentTime);
        osc.connect(context.destination);
        osc.start();
        osc.stop(context.currentTime + 1.5);
    }

    // Play Adhan sound via Online Open-source URL
    function playAdhan() {
        let audio = new Audio("https://www.islamcan.com/audio/adhan/azan1.mp3");
        audio.play().catch(e => console.log("Audio play blocked until user interaction"));
    }

    function triggerAlarm() {
        const type = document.querySelector('input[name="alarmType"]:checked').value;
        if (type === "adhan") playAdhan();
        if (type === "beep") playBeep();
    }

    function loadSettings() {
        const savedMosque = localStorage.getItem('mosqueName');
        if(savedMosque) document.getElementById('mosqueInput').value = savedMosque;
        
        const savedAlarm = localStorage.getItem('alarmChoice');
        if(savedAlarm) {
            document.querySelector(`input[name="alarmType"][value="${savedAlarm}"]`).checked = true;
        }
    }

    function saveSettings() {
        localStorage.setItem('mosqueName', document.getElementById('mosqueInput').value);
        const choice = document.querySelector('input[name="alarmType"]:checked').value;
        localStorage.setItem('alarmChoice', choice);
        prayers.forEach(p => {
            if(document.getElementById('iq_'+p)) {
                localStorage.setItem('iqamah_'+p, document.getElementById('iq_'+p).value);
            }
        });
    }

    async function getTimes() {
        try {
            const res = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Ajman&country=UAE&method=4');
            const json = await res.json();
            const t = json.data.timings;
            document.getElementById('hijri-date').innerText = json.data.date.hijri.day + " " + json.data.date.hijri.month.ar + " " + json.data.date.hijri.year + " AH";

            let html = '';
            prayers.forEach((p, i) => {
                prayerTimes[p] = t[p];
                const savedIq = localStorage.getItem('iqamah_'+p) || "15";
                html += `
                    <div class="prayer-row" id="row-${p}">
                        <div class="row-top">
                            <span class="prayer-name">${namesML[i]} (${p})</span>
                            <span class="prayer-time">${formatAMPM(t[p])}</span>
                        </div>
                        <div class="iqamah-settings">
                            <div>
                                <span>ഇഖാമത്ത്: ബാങ്കിന് ശേഷം </span>
                                <input type="number" id="iq_${p}" class="iqamah-input" value="${savedIq}" onchange="saveSettings()">
                                <span>മിനിറ്റ്</span>
                            </div>
                            <div class="iqamah-countdown" id="cd_${p}"></div>
                        </div>
                    </div>`;
            });
            document.getElementById('prayerTable').innerHTML = html;
            loadSettings();
            
            // Start checking loops
            setInterval(checkLiveUpdates, 1000);
        } catch(e) {
            document.getElementById('hijri-date').innerText = "Network Error";
        }
    }

    function formatAMPM(time24) {
        let [hours, minutes] = time24.split(':');
        hours = parseInt(hours);
        let ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12;
        hours = hours ? hours : 12; 
        return hours + ':' + minutes + ' ' + ampm;
    }

    function checkLiveUpdates() {
        let now = new Date();
        let currentHM = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        let currentHMS = currentHM + ":" + now.getSeconds().toString().padStart(2, '0');

        prayers.forEach(p => {
            let row = document.getElementById('row-' + p);
            let cdBox = document.getElementById('cd_' + p);
            if(!row || !prayerTimes[p]) return;

            // 1. Alarm triggering right at Azan time
            if (prayerTimes[p] + ":00" === currentHMS && !alarmPlayed[p + currentHM]) {
                alarmPlayed[p + currentHM] = true;
                triggerAlarm();
            }

            // 2. Manage Active highlights and Iqamah live countdowns
            let azanTime = prayerTimes[p];
            let iqMinutes = parseInt(document.getElementById('iq_' + p).value) || 0;
            
            let azanDate = new Date();
            let [h, m] = azanTime.split(':');
            azanDate.setHours(h, m, 0);
            
            let iqamahDate = new Date(azanDate.getTime() + iqMinutes * 60000);

            if (now >= azanDate && now <= iqamahDate) {
                row.classList.add('active');
                let diff = iqamahDate - now;
                let min = Math.floor(diff / 60000);
                let sec = Math.floor((diff % 60000) / 1000);
                cdBox.innerText = `ഇഖാമത്ത് ഇനി: ${min}:${sec.toString().padStart(2,'0')}`;
            } else {
                row.classList.remove('active');
                cdBox.innerText = '';
            }
        });
    }

    getTimes();
</script>
</body>
</html>
